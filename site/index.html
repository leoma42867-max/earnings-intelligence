<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>MarketsLite — Attention ahead of earnings</title>
    <meta
      name="description"
      content="MarketsLite ranks companies by investor attention before earnings — StockTwits, Yahoo trends, volume, and price — so you know what prints matter this week."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b1120;
        --text: #f3f7ff;
        --muted: #9fb0cc;
        --accent: #4f8cff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(1200px 600px at 10% -10%, #1a2744 0%, transparent 55%),
          radial-gradient(900px 500px at 100% 0%, #152033 0%, transparent 50%),
          var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
      }

      .page {
        max-width: 920px;
        margin: 0 auto;
        padding: 4.5rem 1.5rem 4rem;
      }

      .brand {
        font-family: "Instrument Serif", Georgia, serif;
        font-size: clamp(3rem, 8vw, 4.75rem);
        line-height: 0.95;
        margin: 0 0 1.25rem;
        letter-spacing: -0.02em;
      }

      .headline {
        font-size: clamp(1.25rem, 3vw, 1.65rem);
        font-weight: 500;
        margin: 0 0 0.75rem;
        max-width: 18ch;
        line-height: 1.25;
      }

      .support {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.5;
        max-width: 36rem;
        margin: 0 0 1.75rem;
      }

      .cta {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        padding: 0.85rem 1.35rem;
        border-radius: 10px;
      }

      .cta:hover {
        filter: brightness(1.08);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="brand">MarketsLite</h1>
      <p class="headline">See what's picking up steam this week</p>
      <p class="support">
        Tracking investor interest ahead of earnings so you can get ahead of the crowd
      </p>
      <a class="cta" href="/app">Open dashboard</a>
    </main>
  </body>
</html>
