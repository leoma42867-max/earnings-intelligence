<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MarketsLite</title>
    <meta
      name="description"
      content="Companies ranked based on investor search activity ahead of earnings reports"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b1120;
      }

      .frame-wrap {
        position: relative;
        width: 100%;
        height: 100%;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      /*
        Streamlit Community Cloud keeps a "Built with Streamlit" mark in the
        sidebar footer. Parent CSS cannot style the cross-origin iframe, so
        cover that corner instead.
      */
      .streamlit-badge-mask {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 360px;
        height: 52px;
        background: #0e1117;
        z-index: 2;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="frame-wrap">
      <iframe
        src="https://earnday.streamlit.app/?embed=true"
        title="MarketsLite"
        allow="clipboard-write; fullscreen"
        loading="eager"
      ></iframe>
      <div class="streamlit-badge-mask" aria-hidden="true"></div>
    </div>
  </body>
</html>
